{% extends "base.html" %}
{% block content %}

<div style="
    min-height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
">

    <div class="card" style="
        display:flex;
        gap:40px;
        padding:30px;
        max-width:900px;
        width:100%;
        align-items:center;
        flex-wrap:wrap;
        position:relative;
        overflow:hidden;
    ">

        <!-- Glow Background -->
        <div style="
            position:absolute;
            width:350px;
            height:350px;
            background:radial-gradient(circle, rgba(0,255,255,0.2), transparent);
            top:-120px;
            right:-120px;
            filter:blur(50px);
        "></div>

        <!-- Book Image -->
        <div style="flex:1;min-width:250px;text-align:center;">
            <div style="overflow:hidden;border-radius:15px;">
                <img src="{{b.image_url}}" style="
                    width:100%;
                    max-width:320px;
                    height:420px;
                    object-fit:cover;
                    transition:0.4s;
                "
                onmouseover="this.style.transform='scale(1.08)'"
                onmouseout="this.style.transform='scale(1)'">
            </div>
        </div>

        <!-- Book Details -->
        <div style="flex:1;min-width:250px;">

            <h1 style="
                font-size:28px;
                margin-bottom:10px;
            ">
                {{b.title}}
            </h1>

            <p style="
                opacity:0.7;
                margin-bottom:10px;
            ">
                ✍️ {{b.author}}
            </p>

            <p style="
                color:cyan;
                font-size:22px;
                font-weight:bold;
                margin-bottom:15px;
            ">
                ₹{{b.price}}
            </p>

            <p style="
                line-height:1.6;
                opacity:0.8;
                margin-bottom:25px;
            ">
                {{b.description}}
            </p>

            <!-- Buttons -->
            <div style="display:flex;gap:15px;flex-wrap:wrap;">
                <button onclick="addToCart('{{b.id}}')" style="
                    padding:12px 20px;
                    font-size:15px;
                    border-radius:12px;
                ">
                    🛒 Add to Cart
                </button>

                <a href="/cart" style="
                    padding:12px 20px;
                    border-radius:12px;
                    background:rgba(255,255,255,0.08);
                    text-decoration:none;
                    color:white;
                    display:inline-block;
                ">
                    Go to Cart
                </a>
            </div>

        </div>

    </div>

</div>

<script>
function addToCart(id){
    fetch(`/add_to_cart/${id}`,{
        method:"POST"
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.status==="success"){
            showToast("✅ Added to Cart");
        }
    });
}

function showToast(msg){
    let t=document.createElement("div");
    t.innerText=msg;
    t.style.position="fixed";
    t.style.bottom="20px";
    t.style.right="20px";
    t.style.background="cyan";
    t.style.color="black";
    t.style.padding="12px 20px";
    t.style.borderRadius="10px";
    t.style.boxShadow="0 0 15px cyan";
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2000);
}
</script>

{% endblock %}
