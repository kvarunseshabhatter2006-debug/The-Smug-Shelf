{% extends "base.html" %}
{% block content %}

<h1 style="
    text-align:center;
    margin:30px 0;
    font-size:28px;
    color:cyan;
    letter-spacing:1px;
">
✏️ Edit Book
</h1>

<div style="
    min-height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
">

<form method="POST" class="card" style="
    width:450px;
    padding:30px;
    border-radius:20px;
    position:relative;
    overflow:hidden;
">

    <!-- Glow Background -->
    <div style="
        position:absolute;
        width:300px;
        height:300px;
        background:radial-gradient(circle, rgba(0,255,255,0.15), transparent);
        top:-100px;
        right:-100px;
        filter:blur(40px);
    "></div>

    <!-- Title -->
    <div style="margin-bottom:15px;">
        <label style="font-size:13px;opacity:0.7;">Title</label>
        <input name="title" value="{{b.title}}" required
        style="
            width:100%;
            padding:12px;
            margin-top:6px;
            border-radius:10px;
            border:1px solid rgba(255,255,255,0.1);
            background:rgba(255,255,255,0.05);
            color:white;
            outline:none;
            transition:0.3s;
        "
        onfocus="this.style.border='1px solid cyan';this.style.boxShadow='0 0 10px cyan'"
        onblur="this.style.border='1px solid rgba(255,255,255,0.1)';this.style.boxShadow='none'">
    </div>

    <!-- Author -->
    <div style="margin-bottom:15px;">
        <label style="font-size:13px;opacity:0.7;">Author</label>
        <input name="author" value="{{b.author}}" required
        style="
            width:100%;
            padding:12px;
            margin-top:6px;
            border-radius:10px;
            border:1px solid rgba(255,255,255,0.1);
            background:rgba(255,255,255,0.05);
            color:white;
        ">
    </div>

    <!-- Category -->
    <div style="margin-bottom:15px;">
        <label style="font-size:13px;opacity:0.7;">Category</label>
        <select name="category" required
        style="
            width:100%;
            padding:12px;
            margin-top:6px;
            border-radius:10px;
            border:1px solid rgba(255,255,255,0.1);
            background:rgba(255,255,255,0.05);
            color:white;
        ">
            <option value="Fiction" {% if b.category=='Fiction' %}selected{% endif %}>Fiction</option>
            <option value="Finance" {% if b.category=='Finance' %}selected{% endif %}>Finance</option>
            <option value="Self Help" {% if b.category=='Self Help' %}selected{% endif %}>Self Help</option>
            <option value="Programming" {% if b.category=='Programming' %}selected{% endif %}>Programming</option>
            <option value="Productivity" {% if b.category=='Productivity' %}selected{% endif %}>Productivity</option>
        </select>
    </div>

    <!-- Price & Stock Row -->
    <div style="display:flex;gap:15px;margin-bottom:15px;">
        <div style="flex:1;">
            <label style="font-size:13px;opacity:0.7;">Price</label>
            <input name="price" type="number" value="{{b.price}}" required
            style="
                width:100%;
                padding:12px;
                margin-top:6px;
                border-radius:10px;
                border:1px solid rgba(255,255,255,0.1);
                background:rgba(255,255,255,0.05);
                color:white;
            ">
        </div>

        <div style="flex:1;">
            <label style="font-size:13px;opacity:0.7;">Stock</label>
            <input name="stock" type="number" value="{{b.stock}}" required
            style="
                width:100%;
                padding:12px;
                margin-top:6px;
                border-radius:10px;
                border:1px solid rgba(255,255,255,0.1);
                background:rgba(255,255,255,0.05);
                color:white;
            ">
        </div>
    </div>

    <!-- Image -->
    <div style="margin-bottom:15px;">
        <label style="font-size:13px;opacity:0.7;">Image URL</label>
        <input name="image_url" value="{{b.image_url}}" required
        style="
            width:100%;
            padding:12px;
            margin-top:6px;
            border-radius:10px;
            border:1px solid rgba(255,255,255,0.1);
            background:rgba(255,255,255,0.05);
            color:white;
        ">
    </div>

    <!-- Description -->
    <div style="margin-bottom:20px;">
        <label style="font-size:13px;opacity:0.7;">Description</label>
        <textarea name="description" rows="4"
        style="
            width:100%;
            padding:12px;
            margin-top:6px;
            border-radius:10px;
            border:1px solid rgba(255,255,255,0.1);
            background:rgba(255,255,255,0.05);
            color:white;
        ">{{b.description}}</textarea>
    </div>

    <!-- Button -->
    <button style="
        width:100%;
        padding:12px;
        font-size:15px;
        font-weight:bold;
        border-radius:12px;
        background:linear-gradient(135deg, cyan, #22d3ee);
        transition:0.3s;
    "
    onmouseover="this.style.boxShadow='0 0 20px cyan';this.style.transform='scale(1.03)'"
    onmouseout="this.style.boxShadow='none';this.style.transform='scale(1)'">
        💾 Update Book
    </button>

</form>
</div>

{% endblock %}
